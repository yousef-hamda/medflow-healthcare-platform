server:
  port: ${SERVER_PORT:8097}

spring:
  application:
    name: hl7v2-ingester

mllp:
  port: ${MLLP_PORT:2575}

fhir:
  base-url: ${FHIR_BASE_URL:http://localhost:8090/fhir}

kafka:
  brokers: ${KAFKA_BROKERS:localhost:9092}
  topics:
    hl7-raw: hl7.raw

otel:
  exporter:
    otlp:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      application: hl7v2-ingester
  prometheus:
    metrics:
      export:
        enabled: true

logging:
  level:
    root: INFO
    com.medflow: INFO
