# BentoML build spec for the MedFlow multi-model service.
# Build:   bentoml build -f bentofile.yaml
# Serve:   bentoml serve service:MedFlowService
service: "service:MedFlowService"
name: medflow-ml
labels:
  owner: ml-platform
  project: medflow
  data: synthetic-only
include:
  - "service.py"
  - "src/medflow_serving/**/*.py"
python:
  requirements_txt: null
  packages:
    - fastapi==0.111.0
    - pydantic==2.7.4
    - pydantic-settings==2.3.4
    - structlog==24.2.0
    - mlflow==2.14.1
    - boto3==1.34.122
    - numpy==1.26.4
    - torch==2.3.1
    - torchvision==0.18.1
    - xgboost==2.0.3
    - shap==0.45.1
    - medspacy==1.1.6
    - spacy==3.7.5
    - pydicom==2.4.4
    - pillow==10.3.0
  lock_packages: true
docker:
  python_version: "3.11"
  system_packages:
    - libgomp1
envs:
  - name: MLFLOW_TRACKING_URI
  - name: MLFLOW_S3_ENDPOINT_URL
  - name: AWS_ACCESS_KEY_ID
  - name: AWS_SECRET_ACCESS_KEY
  - name: CANARY_ENABLED
  - name: CANARY_MODEL_VERSION
