# MedFlow full local stack. All credentials below are development-only defaults.
# Production deployment uses Kubernetes + Vault (see infra/).
name: medflow

x-otel-env: &otel-env
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
  OTEL_RESOURCE_ATTRIBUTES: deployment.environment=local

services:
  # ────────────────────────── Core data stores ──────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: medflow
      POSTGRES_PASSWORD: medflow_dev_password
      POSTGRES_DB: medflow
    command: ["postgres", "-c", "wal_level=logical", "-c", "max_connections=300"]
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/docker/postgres/init-databases.sh:/docker-entrypoint-initdb.d/10-init-databases.sh:ro
      - ./infra/docker/postgres/init-audit.sql:/docker-entrypoint-initdb.d/20-init-audit.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medflow"]
      interval: 5s
      timeout: 5s
      retries: 20

  mongodb:
    image: mongo:7
    environment:
      MONGO_INITDB_ROOT_USERNAME: medflow
      MONGO_INITDB_ROOT_PASSWORD: medflow_dev_password
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ ping: 1 }).ok"]
      interval: 10s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  kafka:
    image: bitnami/kafka:3.7
    environment:
      KAFKA_CFG_NODE_ID: "0"
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "false"
    ports:
      - "9094:9094"
    volumes:
      - kafka-data:/bitnami/kafka
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 18

  kafka-init:
    image: bitnami/kafka:3.7
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "/init/create-topics.sh"]
    volumes:
      - ./infra/docker/kafka/create-topics.sh:/init/create-topics.sh:ro
    restart: "no"

  minio:
    image: minio/minio:RELEASE.2024-06-13T22-53-53Z
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: minio_admin
      MINIO_ROOT_PASSWORD: minio_dev_password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 12

  minio-init:
    image: minio/mc:RELEASE.2024-06-12T14-34-03Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["/bin/sh", "/init/create-buckets.sh"]
    volumes:
      - ./infra/docker/minio/create-buckets.sh:/init/create-buckets.sh:ro
    restart: "no"

  opensearch:
    image: opensearchproject/opensearch:2.13.0
    environment:
      discovery.type: single-node
      DISABLE_SECURITY_PLUGIN: "true"
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 18

  vault:
    image: hashicorp/vault:1.15
    cap_add: ["IPC_LOCK"]
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: medflow-dev-root
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    ports:
      - "8200:8200"
    healthcheck:
      test: ["CMD-SHELL", "vault status >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 12

  vault-init:
    image: hashicorp/vault:1.15
    depends_on:
      vault:
        condition: service_healthy
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: medflow-dev-root
    entrypoint: ["/bin/sh", "/init/bootstrap-transit.sh"]
    volumes:
      - ./infra/vault/bootstrap-transit.sh:/init/bootstrap-transit.sh:ro
    restart: "no"

  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    volumes:
      - ./infra/docker/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -t '$$SYS/#' -C 1 -i healthcheck -W 3 >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 8

  # ────────────────────────── ML platform ──────────────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.14.1
    command: >
      bash -c "pip install -q psycopg2-binary boto3 &&
      mlflow server --host 0.0.0.0 --port 5000
      --backend-store-uri postgresql://medflow:medflow_dev_password@postgres:5432/mlflow
      --artifacts-destination s3://mlflow-artifacts"
    environment:
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: minio_admin
      AWS_SECRET_ACCESS_KEY: minio_dev_password
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

  # ────────────────────────── Batch & streaming compute ──────────────────────────
  airflow-init:
    image: apache/airflow:2.9.2-python3.11
    environment: &airflow-env
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://medflow:medflow_dev_password@postgres:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      AIRFLOW__WEBSERVER__SECRET_KEY: medflow-dev-secret
      AIRFLOW__OPENLINEAGE__TRANSPORT: '{"type": "http", "url": "http://marquez:5001"}'
      AIRFLOW__OPENLINEAGE__NAMESPACE: medflow
      _PIP_ADDITIONAL_REQUIREMENTS: "apache-airflow-providers-apache-spark==4.8.1 apache-airflow-providers-openlineage==1.8.0 great-expectations==0.18.16 boto3==1.34.122"
    command: >
      bash -c "airflow db migrate &&
      airflow users create --username admin --password admin --firstname Med --lastname Flow --role Admin --email admin@medflow.local || true"
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  airflow-webserver:
    image: apache/airflow:2.9.2-python3.11
    environment: *airflow-env
    command: webserver
    ports:
      - "8080:8080"
    volumes: &airflow-volumes
      - ./data/airflow/dags:/opt/airflow/dags:ro
      - ./data/great_expectations:/opt/airflow/great_expectations:ro
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    image: apache/airflow:2.9.2-python3.11
    environment: *airflow-env
    command: scheduler
    volumes: *airflow-volumes
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  spark-master:
    image: bitnami/spark:3.5
    environment:
      SPARK_MODE: master
    ports:
      - "7077:7077"
      - "8081:8080"
    volumes:
      - ./data:/opt/medflow/data:ro

  spark-worker:
    image: bitnami/spark:3.5
    environment:
      SPARK_MODE: worker
      SPARK_MASTER_URL: spark://spark-master:7077
      SPARK_WORKER_MEMORY: 2G
      SPARK_WORKER_CORES: "2"
    volumes:
      - ./data:/opt/medflow/data:ro
    depends_on:
      - spark-master

  flink-jobmanager:
    image: flink:1.18-scala_2.12
    command: jobmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
    ports:
      - "8082:8081"
    volumes:
      - ./data/flink:/opt/medflow/flink:ro

  flink-taskmanager:
    image: flink:1.18-scala_2.12
    command: taskmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 4
    volumes:
      - ./data/flink:/opt/medflow/flink:ro
    depends_on:
      - flink-jobmanager

  # ────────────────────────── Analytics & governance ──────────────────────────
  trino:
    image: trinodb/trino:449
    ports:
      - "8085:8080"
    volumes:
      - ./infra/docker/trino/catalog:/etc/trino/catalog:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/v1/info | grep -q '\"starting\":false'"]
      interval: 15s
      timeout: 5s
      retries: 20

  superset:
    image: apache/superset:3.1.3
    environment:
      SUPERSET_SECRET_KEY: medflow-dev-superset-secret
      DATABASE_DB: superset
      DATABASE_HOST: postgres
      DATABASE_USER: medflow
      DATABASE_PASSWORD: medflow_dev_password
    command: ["/bin/bash", "/app/docker/superset-init.sh"]
    ports:
      - "8088:8088"
    volumes:
      - ./infra/docker/superset/superset-init.sh:/app/docker/superset-init.sh:ro
      - ./infra/docker/superset/superset_config.py:/app/pythonpath/superset_config.py:ro
      - ./infra/docker/superset/assets:/app/medflow-assets:ro
    depends_on:
      postgres:
        condition: service_healthy

  marquez:
    image: marquezproject/marquez:0.47.0
    environment:
      MARQUEZ_PORT: "5001"
      MARQUEZ_ADMIN_PORT: "5002"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: marquez
      POSTGRES_USER: medflow
      POSTGRES_PASSWORD: medflow_dev_password
    ports:
      - "5001:5001"
    depends_on:
      postgres:
        condition: service_healthy

  marquez-web:
    image: marquezproject/marquez-web:0.47.0
    environment:
      MARQUEZ_HOST: marquez
      MARQUEZ_PORT: "5001"
    ports:
      - "3003:3000"
    depends_on:
      - marquez

  # ────────────────────────── Interop layer ──────────────────────────
  fhir-server:
    build: ./apps/fhir-server
    environment:
      <<: *otel-env
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/fhir
      SPRING_DATASOURCE_USERNAME: medflow
      SPRING_DATASOURCE_PASSWORD: medflow_dev_password
      KAFKA_BROKERS: kafka:9092
      SERVER_PORT: "8090"
    ports:
      - "8090:8090"
    depends_on:
      postgres:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8090/actuator/health >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 30

  hl7v2-ingester:
    build: ./apps/hl7v2-ingester
    environment:
      <<: *otel-env
      MLLP_PORT: "2575"
      FHIR_BASE_URL: http://fhir-server:8090/fhir
      KAFKA_BROKERS: kafka:9092
      SERVER_PORT: "8097"
    ports:
      - "2575:2575"
      - "8097:8097"
    depends_on:
      fhir-server:
        condition: service_healthy

  dicom-receiver:
    build: ./apps/dicom-receiver
    environment:
      <<: *otel-env
      DICOM_AE_TITLE: MEDFLOW
      DICOM_PORT: "11112"
      HTTP_PORT: "8091"
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minio_admin
      MINIO_SECRET_KEY: minio_dev_password
      FHIR_BASE_URL: http://fhir-server:8090/fhir
      KAFKA_BROKERS: kafka:9092
    ports:
      - "11112:11112"
      - "8091:8091"
    depends_on:
      minio-init:
        condition: service_completed_successfully
      fhir-server:
        condition: service_healthy

  wearables-ingester:
    build: ./apps/wearables-ingester
    environment:
      <<: *otel-env
      HTTP_PORT: "8092"
      MQTT_BROKER: mosquitto
      MQTT_PORT: "1883"
      DATABASE_URL: postgresql+asyncpg://medflow:medflow_dev_password@postgres:5432/vitals
      KAFKA_BROKERS: kafka:9092
    ports:
      - "8092:8092"
    depends_on:
      postgres:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully

  deid-service:
    build: ./apps/deid-service
    environment:
      <<: *otel-env
      HTTP_PORT: "8093"
      AUDIT_SERVICE_URL: http://audit-service:8095
      DATE_SHIFT_SECRET: dev-only-date-shift-secret
    ports:
      - "8093:8093"

  # ────────────────────────── ML serving ──────────────────────────
  ml-serving:
    build: ./apps/ml-serving
    environment:
      <<: *otel-env
      HTTP_PORT: "8094"
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: minio_admin
      AWS_SECRET_ACCESS_KEY: minio_dev_password
      FEAST_REDIS_HOST: redis
      DATABASE_URL: postgresql+asyncpg://medflow:medflow_dev_password@postgres:5432/predictions
      KAFKA_BROKERS: kafka:9092
      CANARY_ENABLED: "false"
    ports:
      - "8094:8094"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  ml-batch:
    build: ./apps/ml-batch
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: minio_admin
      AWS_SECRET_ACCESS_KEY: minio_dev_password
      SPARK_MASTER: spark://spark-master:7077
      DELTA_S3_ENDPOINT: http://minio:9000
    volumes:
      - ./ml:/opt/medflow/ml
    profiles: ["jobs"]

  # ────────────────────────── Application layer ──────────────────────────
  audit-service:
    build:
      context: .
      dockerfile: apps/audit-service/Dockerfile
      target: prod
    environment:
      <<: *otel-env
      HTTP_PORT: "8095"
      DATABASE_URL: postgresql://medflow:medflow_dev_password@postgres:5432/audit
      KAFKA_BROKERS: kafka:9092
      WORM_BUCKET: audit-worm
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minio_admin
      MINIO_SECRET_KEY: minio_dev_password
    ports:
      - "8095:8095"
    depends_on:
      postgres:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully

  cds-hooks-service:
    build:
      context: .
      dockerfile: apps/cds-hooks-service/Dockerfile
      target: prod
    environment:
      <<: *otel-env
      HTTP_PORT: "8096"
      ML_SERVING_URL: http://ml-serving:8094
      FHIR_BASE_URL: http://fhir-server:8090/fhir
    ports:
      - "8096:8096"
    depends_on:
      - ml-serving

  api-gateway:
    build:
      context: .
      dockerfile: apps/api-gateway/Dockerfile
      target: prod
    environment:
      <<: *otel-env
      HTTP_PORT: "4000"
      DATABASE_URL: postgresql://medflow:medflow_dev_password@postgres:5432/gateway
      FHIR_BASE_URL: http://fhir-server:8090/fhir
      ML_SERVING_URL: http://ml-serving:8094
      TRINO_URL: http://trino:8080
      AUDIT_SERVICE_URL: http://audit-service:8095
      DEID_SERVICE_URL: http://deid-service:8093
      REDIS_URL: redis://redis:6379
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: medflow-dev-root
      OIDC_ISSUER: http://localhost:4000
      JWT_SIGNING_KEY: dev-only-jwt-signing-key-change-me
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      fhir-server:
        condition: service_healthy

  realtime-gateway:
    build:
      context: .
      dockerfile: apps/realtime-gateway/Dockerfile
      target: prod
    environment:
      <<: *otel-env
      HTTP_PORT: "4001"
      KAFKA_BROKERS: kafka:9092
      API_GATEWAY_URL: http://api-gateway:4000
      JWT_SIGNING_KEY: dev-only-jwt-signing-key-change-me
    ports:
      - "4001:4001"
    depends_on:
      kafka-init:
        condition: service_completed_successfully

  clinician-dashboard:
    build:
      context: .
      dockerfile: apps/clinician-dashboard/Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
      NEXT_PUBLIC_REALTIME_URL: http://localhost:4001
      NEXT_PUBLIC_FHIR_URL: http://localhost:8090/fhir
    ports:
      - "3000:3000"
    depends_on:
      - api-gateway

  patient-portal:
    build:
      context: .
      dockerfile: apps/patient-portal/Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
      NEXT_PUBLIC_REALTIME_URL: http://localhost:4001
    ports:
      - "3001:3001"
    depends_on:
      - api-gateway

  # ────────────────────────── Observability ──────────────────────────
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.102.0
    command: ["--config=/etc/otelcol/config.yml"]
    volumes:
      - ./infra/docker/otel-collector/config.yml:/etc/otelcol/config.yml:ro
    ports:
      - "4317:4317"
      - "4318:4318"

  prometheus:
    image: prom/prometheus:v2.52.0
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:10.4.3
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3002:3000"
    depends_on:
      - prometheus
      - loki
      - tempo

  loki:
    image: grafana/loki:2.9.8
    command: ["-config.file=/etc/loki/loki-config.yml"]
    volumes:
      - ./infra/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki-data:/loki
    ports:
      - "3100:3100"

  tempo:
    image: grafana/tempo:2.4.2
    command: ["-config.file=/etc/tempo/tempo.yml"]
    volumes:
      - ./infra/tempo/tempo.yml:/etc/tempo/tempo.yml:ro
      - tempo-data:/var/tempo
    ports:
      - "3200:3200"

volumes:
  postgres-data:
  mongo-data:
  redis-data:
  kafka-data:
  minio-data:
  opensearch-data:
  prometheus-data:
  grafana-data:
  loki-data:
  tempo-data:
