version: 2

# Intentionally minimal. This is a synthetic-data portfolio project, not an
# actively-maintained production service, so Dependabot is kept very quiet:
# a single grouped check, monthly, with at most one open PR at a time — enough
# to demonstrate supply-chain hygiene without flooding the inbox.
#
# To re-enable broad per-service updates later, add more `package-ecosystem`
# entries (npm / pip / maven / docker per app). To turn Dependabot off entirely,
# delete this file or set `open-pull-requests-limit: 0` on each entry.

updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
    open-pull-requests-limit: 1
    commit-message:
      prefix: "chore(ci)"
    groups:
      github-actions:
        patterns: ["*"]
