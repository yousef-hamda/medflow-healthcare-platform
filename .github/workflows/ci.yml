name: CI

# All MedFlow data is synthetic (Synthea). No real PHI is ever processed in CI.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Nightly run that also exercises the FHIR conformance (Inferno) job.
    - cron: "0 4 * * *"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: "20"
  PYTHON_VERSION: "3.11"
  JAVA_VERSION: "17"
  REGISTRY: ghcr.io

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # Detect which parts of the monorepo changed so we only run what we must.
  # ────────────────────────────────────────────────────────────────────────────
  change-detection:
    name: Change detection
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      node: ${{ steps.filter.outputs.node }}
      python: ${{ steps.filter.outputs.python }}
      java: ${{ steps.filter.outputs.java }}
      dbt: ${{ steps.filter.outputs.dbt }}
      docker: ${{ steps.filter.outputs.docker }}
    steps:
      - uses: actions/checkout@v7
      - id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            node:
              - 'apps/api-gateway/**'
              - 'apps/realtime-gateway/**'
              - 'apps/audit-service/**'
              - 'apps/cds-hooks-service/**'
              - 'apps/clinician-dashboard/**'
              - 'apps/patient-mobile/**'
              - 'packages/**'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'package.json'
              - 'tsconfig*.json'
            python:
              - 'apps/dicom-receiver/**'
              - 'apps/wearables-ingester/**'
              - 'apps/deid-service/**'
              - 'apps/ml-serving/**'
              - 'apps/ml-batch/**'
              - 'ml/**'
              - 'scripts/**'
            java:
              - 'apps/fhir-server/**'
              - 'apps/hl7v2-ingester/**'
            dbt:
              - 'data/dbt/**'
            docker:
              - 'apps/**/Dockerfile'
              - 'docker-compose*.yml'

  # ────────────────────────────────────────────────────────────────────────────
  # Node workspaces (pnpm): lint, typecheck, test with coverage gate (70%).
  # ────────────────────────────────────────────────────────────────────────────
  node:
    name: Node (pnpm workspaces)
    needs: change-detection
    if: needs.change-detection.outputs.node == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      pull-requests: write # to post the coverage comment
    steps:
      - uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.4.0
          run_install: false

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Cache pnpm store
        uses: actions/cache@v6
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile  # commit pnpm-lock.yaml to switch back to --frozen-lockfile

      - name: Lint
        run: pnpm -r --if-present lint

      - name: Typecheck
        run: pnpm -r --if-present typecheck

      - name: Test with coverage
        run: pnpm -r --if-present test -- --coverage

      # Per-package coverage gate of 70% (vitest/jest both emit coverage-summary.json).
      - name: Enforce coverage gate (70% per package)
        run: |
          fail=0
          while IFS= read -r summary; do
            pkg="$(dirname "$(dirname "$summary")")"
            pct=$(node -e "const s=require('./$summary').total;const v=['lines','statements','functions','branches'].map(k=>s[k].pct);process.stdout.write(String(Math.min(...v)))")
            echo "coverage($pkg) = ${pct}% (min metric)"
            awk "BEGIN{exit !($pct < 70)}" && { echo \"::error::$pkg below 70% coverage ($pct%)\"; fail=1; }
          done < <(find apps packages -path '*/coverage/coverage-summary.json' 2>/dev/null)
          exit $fail

      - name: Comment coverage on PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const cp = require('child_process');
            const files = cp.execSync(
              "find apps packages -path '*/coverage/coverage-summary.json' 2>/dev/null || true"
            ).toString().trim().split('\n').filter(Boolean);
            let body = '### Coverage report (gate: 70% per package)\n\n';
            if (!files.length) {
              body += '_No coverage summaries found._';
            } else {
              body += '| Package | Lines | Statements | Functions | Branches | Gate |\n';
              body += '|---|---|---|---|---|---|\n';
              for (const f of files) {
                const pkg = f.replace('/coverage/coverage-summary.json', '');
                const t = JSON.parse(fs.readFileSync(f, 'utf8')).total;
                const mins = ['lines','statements','functions','branches'].map(k => t[k].pct);
                const pass = Math.min(...mins) >= 70 ? '✅' : '❌';
                body += `| \`${pkg}\` | ${t.lines.pct}% | ${t.statements.pct}% | ${t.functions.pct}% | ${t.branches.pct}% | ${pass} |\n`;
              }
            }
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number,
            });
            const marker = '<!-- medflow-coverage -->';
            body = marker + '\n' + body;
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner: context.repo.owner, repo: context.repo.repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, body });
            }

  # ────────────────────────────────────────────────────────────────────────────
  # Python services (src layout, pyproject): ruff, black, mypy, pytest coverage.
  # ────────────────────────────────────────────────────────────────────────────
  python:
    name: Python (${{ matrix.dir }})
    needs: change-detection
    if: needs.change-detection.outputs.python == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        dir:
          - apps/dicom-receiver
          - apps/wearables-ingester
          - apps/deid-service
          - apps/ml-serving
          - apps/ml-batch
    steps:
      - uses: actions/checkout@v7

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install package + dev tooling
        working-directory: ${{ matrix.dir }}
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" || pip install -e .
          pip install ruff black mypy pytest pytest-cov

      - name: Ruff
        working-directory: ${{ matrix.dir }}
        run: ruff check .

      - name: Black (check)
        working-directory: ${{ matrix.dir }}
        run: black --check .

      - name: Mypy
        working-directory: ${{ matrix.dir }}
        run: mypy src

      - name: Pytest (coverage gate 70%)
        working-directory: ${{ matrix.dir }}
        env:
          PYTHONPATH: src
        run: pytest --cov=src --cov-report=term-missing --cov-fail-under=70

  # ────────────────────────────────────────────────────────────────────────────
  # Java services (maven): mvn verify.
  # ────────────────────────────────────────────────────────────────────────────
  java:
    name: Java (${{ matrix.service }})
    needs: change-detection
    if: needs.change-detection.outputs.java == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        service:
          - apps/fhir-server
          - apps/hl7v2-ingester
    steps:
      - uses: actions/checkout@v7

      - name: Setup Java (Temurin ${{ env.JAVA_VERSION }})
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Cache ~/.m2
        uses: actions/cache@v6
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles(format('{0}/pom.xml', matrix.service)) }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Skip if service has no pom
        id: pom
        run: |
          if [ -f "${{ matrix.service }}/pom.xml" ]; then echo "present=true" >> "$GITHUB_OUTPUT"; else echo "present=false" >> "$GITHUB_OUTPUT"; echo "::notice::${{ matrix.service }} has no pom.xml yet — skipping"; fi

      - name: Maven verify
        if: steps.pom.outputs.present == 'true'
        working-directory: ${{ matrix.service }}
        run: mvn -B verify

  # ────────────────────────────────────────────────────────────────────────────
  # dbt (Spark adapter): deps + parse.
  # ────────────────────────────────────────────────────────────────────────────
  dbt:
    name: dbt parse
    needs: change-detection
    if: needs.change-detection.outputs.dbt == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dbt-spark
        run: |
          python -m pip install --upgrade pip
          pip install "dbt-spark[PyHive]"

      - name: dbt deps + parse
        working-directory: data/dbt
        env:
          DBT_PROFILES_DIR: ${{ github.workspace }}/data/dbt
        run: |
          dbt deps
          dbt parse --no-partial-parse

  # ────────────────────────────────────────────────────────────────────────────
  # Build every service image. Push (sha-tagged) to GHCR only on main.
  # ────────────────────────────────────────────────────────────────────────────
  docker-build:
    name: Docker build (${{ matrix.service.name }})
    needs: [change-detection, node, python, java]
    # Run if docker (or any compiled source) changed and the upstream lint/test
    # jobs did not fail. Skipped upstream jobs are treated as success.
    if: |
      always() &&
      needs.change-detection.outputs.docker == 'true' &&
      !contains(needs.*.result, 'failure')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        service:
          - { name: dicom-receiver, context: apps/dicom-receiver }
          - { name: wearables-ingester, context: apps/wearables-ingester }
          - { name: ml-serving, context: apps/ml-serving }
          - { name: ml-batch, context: apps/ml-batch }
          - { name: fhir-server, context: apps/fhir-server }
    steps:
      - uses: actions/checkout@v7

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (and push on main)
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.context }}/Dockerfile
          push: ${{ github.ref == 'refs/heads/main' && github.event_name == 'push' }}
          tags: ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.service.name }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service.name }}
          load: ${{ github.ref != 'refs/heads/main' }}

  # ────────────────────────────────────────────────────────────────────────────
  # Security: Trivy image scan, Syft SBOM, Grype, and cosign keyless signing.
  # ────────────────────────────────────────────────────────────────────────────
  security:
    name: Security scan (${{ matrix.service }})
    needs: docker-build
    if: always() && needs.docker-build.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      packages: read
      id-token: write # cosign keyless (OIDC)
    strategy:
      fail-fast: false
      matrix:
        service: [dicom-receiver, wearables-ingester, ml-serving, ml-batch, fhir-server]
    env:
      IMAGE: ghcr.io/${{ github.repository }}/${{ matrix.service }}:${{ github.sha }}
    steps:
      - uses: actions/checkout@v7

      - name: Log in to GHCR
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Trivy image scan (fail on HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE }}
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true
          format: table

      - name: Generate SBOM (Syft)
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.IMAGE }}
          format: spdx-json
          output-file: sbom-${{ matrix.service }}.spdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v7
        with:
          name: sbom-${{ matrix.service }}
          path: sbom-${{ matrix.service }}.spdx.json

      - name: Grype scan of SBOM (fail on high)
        uses: anchore/scan-action@v7
        with:
          sbom: sbom-${{ matrix.service }}.spdx.json
          severity-cutoff: high
          fail-build: true

      - name: Install cosign
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: sigstore/cosign-installer@v3

      - name: Cosign keyless sign
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: cosign sign --yes ${{ env.IMAGE }}

  # ────────────────────────────────────────────────────────────────────────────
  # End-to-end: Playwright against @mocked suites (no live backend required).
  # ────────────────────────────────────────────────────────────────────────────
  e2e:
    name: E2E (Playwright, mocked)
    needs: node
    if: always() && needs.node.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.4.0

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile  # commit pnpm-lock.yaml to switch back to --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter @medflow/clinician-dashboard exec playwright install --with-deps chromium

      # Mocked suites run the frontend against route mocks (grep @mocked) so the
      # whole compose stack (postgres/kafka/minio/fhir/gateway) is not needed.
      # To exercise the real stack instead, bring up the core subset first:
      #   docker compose up -d postgres kafka minio fhir-server api-gateway
      - name: Run mocked E2E suites
        run: pnpm --filter @medflow/clinician-dashboard exec playwright test --grep @mocked
        env:
          PW_BASE_URL: http://localhost:3000

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: apps/clinician-dashboard/playwright-report
          retention-days: 14

  # ────────────────────────────────────────────────────────────────────────────
  # FHIR conformance (Inferno). Gated: only on schedule or the `fhir-conformance`
  # label, because it needs a running FHIR server and is slow.
  # ────────────────────────────────────────────────────────────────────────────
  fhir-conformance:
    name: FHIR conformance (Inferno)
    needs: change-detection
    if: |
      github.event_name == 'schedule' ||
      contains(github.event.pull_request.labels.*.name, 'fhir-conformance')
    runs-on: ubuntu-latest
    timeout-minutes: 40
    services:
      fhir-server:
        image: ghcr.io/${{ github.repository }}/fhir-server:${{ github.sha }}
        ports:
          - 8090:8090
    steps:
      - uses: actions/checkout@v7

      - name: Wait for FHIR server
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8090/fhir/metadata >/dev/null 2>&1; then
              echo "FHIR server is up"; exit 0
            fi
            sleep 5
          done
          echo "::error::FHIR server did not become healthy"; exit 1

      # Inferno US Core test kit runs as a container against the FHIR endpoint.
      # Gating: a non-zero exit (failed assertions) fails the job. On scheduled
      # runs this is informational-but-tracked; on labelled PRs it blocks merge.
      - name: Run Inferno US Core suite
        run: |
          docker run --rm --network host \
            -e FHIR_URL=http://localhost:8090/fhir \
            inferno-framework/inferno-core:latest \
            bundle exec inferno execute \
              --suite us_core_v610 \
              --inputs url=http://localhost:8090/fhir \
              --outputter json > inferno-results.json

      - name: Upload Inferno results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: inferno-results
          path: inferno-results.json
