# Grafana dashboard provisioning: load every JSON in /var/lib/grafana/dashboards.
apiVersion: 1

providers:
  - name: medflow
    orgId: 1
    folder: MedFlow
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
