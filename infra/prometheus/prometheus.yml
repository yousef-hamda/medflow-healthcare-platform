# Prometheus configuration for the MedFlow local stack.

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: medflow-local

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # Metrics pushed by services via OTLP, re-exported by the collector.
  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8889"]

  - job_name: api-gateway
    metrics_path: /metrics
    static_configs:
      - targets: ["api-gateway:4000"]

  - job_name: ml-serving
    metrics_path: /metrics
    static_configs:
      - targets: ["ml-serving:8094"]

  - job_name: audit-service
    metrics_path: /metrics
    static_configs:
      - targets: ["audit-service:8095"]

  - job_name: wearables-ingester
    metrics_path: /metrics
    static_configs:
      - targets: ["wearables-ingester:8092"]

  - job_name: fhir-server
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["fhir-server:8090"]

  - job_name: dicom-receiver
    metrics_path: /metrics
    static_configs:
      - targets: ["dicom-receiver:8091"]
