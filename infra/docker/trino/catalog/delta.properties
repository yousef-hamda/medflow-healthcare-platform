# Trino catalog: Delta Lake tables in the MinIO lakehouse bucket.
# NOTE: requires a Hive metastore; point hive.metastore.uri at it when one is
# added to the stack (placeholder host below keeps the catalog parseable).
connector.name=delta_lake
hive.metastore.uri=thrift://hive-metastore:9083

fs.native-s3.enabled=true
s3.endpoint=http://minio:9000
s3.region=us-east-1
s3.path-style-access=true
s3.aws-access-key=minio_admin
s3.aws-secret-key=minio_dev_password

delta.enable-non-concurrent-writes=true
