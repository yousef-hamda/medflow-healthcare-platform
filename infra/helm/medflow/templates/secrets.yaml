{{- /*
DEV-ONLY Secret rendered from values.

PRODUCTION NOTE:
  Do NOT ship real credentials through Helm values. Set secrets.create=false
  and deliver a Secret with the same name ({{ .Values.secrets.name }}) and the
  same keys via external-secrets (ExternalSecret -> Vault or AWS Secrets
  Manager). The Deployments only reference the Secret by name, so swapping the
  delivery mechanism requires no chart changes. On AWS/EKS, prefer IRSA
  (infra/terraform/iam.tf) over static MINIO/S3 keys entirely.
*/ -}}
{{- if .Values.secrets.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.secrets.name }}
  labels:
    {{- include "medflow.labels" . | nindent 4 }}
    app.kubernetes.io/name: {{ .Values.secrets.name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
  annotations:
    medflow.io/warning: "dev placeholder values - replace via external-secrets in production"
type: Opaque
stringData:
  {{- range $key, $value := .Values.secrets.data }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
{{- end }}
