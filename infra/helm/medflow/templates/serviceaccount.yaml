{{- /*
One ServiceAccount per service. Per-service annotations (e.g. IRSA role ARNs
on EKS — see infra/terraform/iam.tf) come from
services.<name>.serviceAccountAnnotations and are merged over the chart-wide
serviceAccount.annotations.
*/ -}}
{{- if .Values.serviceAccount.create }}
{{- $root := . -}}
{{- range $name, $svc := .Values.services }}
{{- if $svc.enabled }}
{{- $annotations := merge (dict) ($svc.serviceAccountAnnotations | default dict) ($root.Values.serviceAccount.annotations | default dict) }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $name }}
  labels:
    {{- include "medflow.labels" $root | nindent 4 }}
    {{- include "medflow.selectorLabels" (dict "root" $root "name" $name) | nindent 4 }}
  {{- with $annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: true
{{- end }}
{{- end }}
{{- end }}
