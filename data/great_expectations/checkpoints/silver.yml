name: silver
config_version: 1.0
class_name: Checkpoint
module_name: great_expectations.checkpoint

# Runtime-batch checkpoint for the silver layer. The concrete RuntimeBatchRequest
# (datasource `medflow_spark`, connector `medflow_runtime`, batch_identifiers
# {run_id}) and expectation_suite_name are supplied by common/ge_checkpoint.py at
# run time via the `validations` argument to run_checkpoint().
run_name_template: "silver-%Y%m%d-%H%M%S"

validations: []

batch_request:
  datasource_name: medflow_spark
  data_connector_name: medflow_runtime
  data_asset_name: silver_table
  batch_identifiers:
    run_id: manual

action_list:
  - name: store_validation_result
    action:
      class_name: StoreValidationResultAction
  - name: store_evaluation_params
    action:
      class_name: StoreEvaluationParametersAction
  - name: update_data_docs
    action:
      class_name: UpdateDataDocsAction
